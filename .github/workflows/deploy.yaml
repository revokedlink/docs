name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**'
      - 'index.html'
  repository_dispatch:
    types: [ api-released ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy spec for new version
        if: github.event_name == 'repository_dispatch'
        run: |
          VERSION=${{ github.event.client_payload.version }}
          mkdir -p specs
          cp specs/latest.yaml specs/${VERSION}.yaml || echo "No latest.yaml yet"
          echo "Versioned spec saved as specs/${VERSION}.yaml"

      - name: Rebuild versions list
        run: |
          # Generate versions.json from all spec files
          VERSIONS=$(ls specs/*.yaml 2>/dev/null | grep -v latest | sort -V -r | xargs -I{} basename {} .yaml | jq -R . | jq -s .)
          echo "{ \"versions\": $VERSIONS }" > versions.json

      - name: Inject versions into index.html
        run: |
          SOURCES=""
          
          for f in $(ls specs/v*.yaml 2>/dev/null | sort -V -r); do
            VERSION=$(basename "$f" .yaml)
          
            if [ -z "$SOURCES" ]; then
              SOURCES="{\"title\":\"${VERSION}\",\"slug\":\"${VERSION}\",\"url\":\"specs/${VERSION}.yaml\",\"default\":true}"
            else
              SOURCES="${SOURCES},{\"title\":\"${VERSION}\",\"slug\":\"${VERSION}\",\"url\":\"specs/${VERSION}.yaml\"}"
            fi
          done
          
          FINAL_SOURCES="[${SOURCES}]"
          
          sed -i "s|__VERSIONS__|${FINAL_SOURCES}|g" index.html

      - name: Commit data changes ONLY
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add versions.json specs/
          
          git diff --staged --quiet || (git commit -m "chore: update specs [skip ci]" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4