name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**'
      - 'index.html'
  repository_dispatch:
    types: [api-released]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy spec for new version (on api-released event)
        if: github.event_name == 'repository_dispatch'
        run: |
          VERSION=${{ github.event.client_payload.version }}
          mkdir -p specs
          # Copy latest openapi.yaml as the versioned spec
          cp specs/latest.yaml specs/${VERSION}.yaml || echo "No latest.yaml yet, skipping copy"
          echo "Versioned spec saved as specs/${VERSION}.yaml"

      - name: Rebuild versions list
        run: |
          # Generate versions.json from all spec files
          VERSIONS=$(ls specs/*.yaml 2>/dev/null | grep -v latest | sort -V -r | xargs -I{} basename {} .yaml | jq -R . | jq -s .)
          echo "{ \"versions\": $VERSIONS }" > versions.json
          cat versions.json

      - name: Inject versions into index.html
        run: |
          SOURCES=""
          for f in $(ls specs/*.yaml 2>/dev/null | grep -v latest | sort -V -r); do
            VERSION=$(basename $f .yaml)
            SOURCES="${SOURCES}{ \"title\": \"${VERSION}\", \"url\": \"./specs/${VERSION}.yaml\" },"
          done
          # Remove trailing comma
          SOURCES="[${SOURCES%,}]"
          sed -i "s|__VERSIONS__|${SOURCES}|g" index.html

      - name: Commit versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json specs/ index.html
          git diff --staged --quiet || git commit -m "chore: rebuild docs [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.md'
