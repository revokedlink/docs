openapi: 3.1.0
info:
  title: revoked API
  description: Revoked.link is a self-hosted digital identity platform that empowers you to maintain total ownership of your personal data by providing services with secure, real-time access instead of static, permanent copies.
  version: latest
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license

servers:
  - url: https://api.revoked.link
    description: Production
  - url: http://localhost:7744
    description: Local development

tags:
  - name: Health
    description: Service health and status

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns the current health status of the API.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: v1.0.0